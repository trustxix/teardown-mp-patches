name: Validate Patched Mods

on:
  push:
    branches: [main, master]
    paths: ['mods/**', 'tools/**', 'tests/**']
  pull_request:
    paths: ['mods/**', 'tools/**', 'tests/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
